global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'prepx-app'
    static_configs:
      - targets: ['prepx:3000']
    metrics_path: /api/metrics

  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14268']

  - job_name: 'plausible'
    static_configs:
      - targets: ['plausible:8000']

  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n:5678']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  - job_name: 'mautic'
    static_configs:
      - targets: ['mautic:80']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
